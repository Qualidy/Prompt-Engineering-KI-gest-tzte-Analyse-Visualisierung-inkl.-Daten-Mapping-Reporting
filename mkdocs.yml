site_name: Power BI Schulung
site_description: Von den Rohdaten zum fertigen Datenmodell und weiter zu Visualisierung, KI & Copilot (für Controlling)

nav:
  - Start: index.md
  - Datensätze: content/datensaetze.md
  - "Teil 1 – Vom Rohdatensatz zum Modell":
      - 0 · Grundlagen: content/00-grundlagen.md
      - 1 · Daten einlesen: content/01-einlesen.md
      - 2 · Daten transformieren: content/02-transformieren.md
      - 3 · Datenmodell erstellen: content/03-datenmodell.md
      - 4 · Abschluss & Checkliste: content/04-abschluss.md
  - "Teil 2 – Auswertung, Vorhersage & KI":
      - 5 · Visualisierung: content/05-visualisierung.md
      - 6 · Machine Learning & KI: content/06-machine-learning-ki.md
      - 7 · Copilot & Datenanalyse: content/07-copilot.md

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Zum dunklen Modus wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Zum hellen Modus wechseln
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    admonition:
      merksatz: material/lightbulb-on
      profi: material/rocket-launch
      gemeinsam: material/monitor-dashboard
  features:
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.keys
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - footnotes
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true

extra_css:
  - stylesheets/logo.css
  - stylesheets/grid.css
  - stylesheets/video_admonition.css
  - stylesheets/python_tutor_admonition.css
  - stylesheets/mermaid.css
  - stylesheets/powerbi.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - macros

extra:
  social:
    - icon: fontawesome/solid/k
      link: https://www.kununu.com/de/qualidy
    - icon: fontawesome/brands/linkedin
      link: https://de.linkedin.com/company/qualidy
    - icon: fontawesome/solid/globe
      link: https://qualidy.de

watch:
  - tasks
  - main.py

copyright: Copyright &copy; 2026 Qualidy GmbH
